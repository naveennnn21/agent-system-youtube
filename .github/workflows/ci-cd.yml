name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}-api
  DASHBOARD_IMAGE: ghcr.io/${{ github.repository }}-dashboard

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: youtube_shorts_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d youtube_shorts_agent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/youtube_shorts_agent
      DATABASE_SYNC_URL: postgresql://postgres:postgres@localhost:5432/youtube_shorts_agent
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      APP_ENV: development
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run backend tests
        run: python -m pytest -q

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build dashboard
        run: corepack pnpm run build

  docker-images:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.event_name != 'pull_request'
    outputs:
      api-image: ${{ steps.meta.outputs.api-image }}
      dashboard-image: ${{ steps.meta.outputs.dashboard-image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || '/api/v1' }}
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}
            ${{ env.DASHBOARD_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: meta
        name: Export image names
        run: |
          echo "api-image=${API_IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "dashboard-image=${DASHBOARD_IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy-aws:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: docker-images
    if: github.ref == 'refs/heads/main' && vars.AWS_ECS_CLUSTER != '' && vars.AWS_API_SERVICE != ''
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Render API task definition
        id: api-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: deploy/aws/api-task-definition.json
          container-name: api
          image: ${{ needs.docker-images.outputs.api-image }}

      - name: Deploy API service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.api-task.outputs.task-definition }}
          service: ${{ vars.AWS_API_SERVICE }}
          cluster: ${{ vars.AWS_ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Render worker task definition
        id: worker-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: deploy/aws/worker-task-definition.json
          container-name: celery-worker
          image: ${{ needs.docker-images.outputs.api-image }}

      - name: Deploy worker service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.worker-task.outputs.task-definition }}
          service: ${{ vars.AWS_WORKER_SERVICE }}
          cluster: ${{ vars.AWS_ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Render beat task definition
        id: beat-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: deploy/aws/beat-task-definition.json
          container-name: celery-beat
          image: ${{ needs.docker-images.outputs.api-image }}

      - name: Deploy beat service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.beat-task.outputs.task-definition }}
          service: ${{ vars.AWS_BEAT_SERVICE }}
          cluster: ${{ vars.AWS_ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Render dashboard task definition
        id: dashboard-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: deploy/aws/dashboard-task-definition.json
          container-name: dashboard
          image: ${{ needs.docker-images.outputs.dashboard-image }}

      - name: Deploy dashboard service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.dashboard-task.outputs.task-definition }}
          service: ${{ vars.AWS_DASHBOARD_SERVICE }}
          cluster: ${{ vars.AWS_ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker-images
    if: github.ref == 'refs/heads/main' && vars.RENDER_DEPLOY_ENABLED == 'true'
    steps:
      - name: Trigger Render deploy hook
        run: curl --fail --request POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: docker-images
    if: github.ref == 'refs/heads/main' && vars.RAILWAY_DEPLOY_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy API service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "${{ vars.RAILWAY_API_SERVICE }}" --detach

      - name: Deploy worker service
        if: vars.RAILWAY_WORKER_SERVICE != ''
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "${{ vars.RAILWAY_WORKER_SERVICE }}" --detach

      - name: Deploy beat service
        if: vars.RAILWAY_BEAT_SERVICE != ''
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "${{ vars.RAILWAY_BEAT_SERVICE }}" --detach

      - name: Deploy dashboard service
        if: vars.RAILWAY_DASHBOARD_SERVICE != ''
        working-directory: frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "${{ vars.RAILWAY_DASHBOARD_SERVICE }}" --detach
