# Alembic configuration file.
#
# This file is read by Alembic at runtime.  It is also consulted when
# generating new migration scripts via ``alembic revision``.

[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate migration file names.
# Uncomment the line below to have files prefixed with a date stamp.
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path used when loading the Alembic env.py module.
# Defaults to the current directory.
prepend_sys_path = .

# Timezone to use when rendering the date in migration file names.
# Leave commented to use the local timezone.
# timezone =

# Max length of characters to apply to the "slug" field.
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# Set to 'true' to allow .hierarchies file updates during autogenerate.
# output_encoding = utf-8

# Database URL — uses a *synchronous* driver for Alembic CLI.
# The value is interpolated from the environment or overridden in env.py.
sqlalchemy.url = %(DATABASE_SYNC_URL)s


[post_write_hooks]
# Post-write hooks are run after a new revision file is generated.
# Uncomment and configure below to auto-format with black.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

# ── Logging ──────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
