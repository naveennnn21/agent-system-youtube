services:
  grafana:
    image: grafana/grafana:11.4.0
    container_name: youtube_shorts_agent_grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - agent-network

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: youtube_shorts_agent_prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - agent-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    container_name: youtube_shorts_agent_cadvisor
    ports:
      - "${CADVISOR_PORT:-8081}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    networks:
      - agent-network

  loki:
    image: grafana/loki:3.3.2
    container_name: youtube_shorts_agent_loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - loki_data:/loki
    restart: unless-stopped
    networks:
      - agent-network

  promtail:
    image: grafana/promtail:3.3.2
    container_name: youtube_shorts_agent_promtail
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./deploy/monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - agent-network

volumes:
  grafana_data:
  prometheus_data:
  loki_data:
